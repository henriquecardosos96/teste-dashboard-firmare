<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firmare · Dashboard Gerencial</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --marrom: #5C3317;
  --marrom2: #7A4520;
  --dourado: #B8922A;
  --dourado2: #C5A467;
  --bege: #E8DFD0;
  --fundo: #F9F7F2;
  --branco: #FFFFFF;
  --texto: #2D2017;
  --texto2: #7A6555;
  --verde: #2E7D32;
  --vermelho: #C62828;
  --amarelo: #F9A825;
  --sombra: 0 2px 12px rgba(92,51,23,.08);
  --sombra2: 0 4px 24px rgba(92,51,23,.13);
  --radius: 14px;
  --radius2: 10px;
  --t: all .2s ease;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--fundo); color: var(--texto); min-height: 100vh; }

/* ── LOGIN ── */
#login-screen {
  position: fixed; inset: 0; background: var(--marrom);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.login-box {
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
  border-radius: 20px; padding: 3rem 2.5rem; width: 340px; text-align: center;
  backdrop-filter: blur(10px);
}
.login-logo { height: 60px; margin-bottom: 1.5rem; }
.login-title { font-family: 'Montserrat', sans-serif; font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: .35rem; }
.login-sub { font-size: .7rem; letter-spacing: 2px; color: var(--dourado2); margin-bottom: 2rem; text-transform: uppercase; }
.login-input {
  width: 100%; padding: .85rem 1rem; border: 1px solid rgba(255,255,255,.2);
  border-radius: var(--radius2); background: rgba(255,255,255,.1); color: #fff;
  font-size: .95rem; font-family: 'Inter', sans-serif; outline: none;
  transition: var(--t); margin-bottom: 1rem;
}
.login-input::placeholder { color: rgba(255,255,255,.4); }
.login-input:focus { border-color: var(--dourado2); background: rgba(255,255,255,.15); }
.login-btn {
  width: 100%; padding: .9rem; background: var(--dourado); border: none;
  border-radius: var(--radius2); color: #fff; font-family: 'Montserrat', sans-serif;
  font-size: .85rem; font-weight: 700; letter-spacing: 1.5px; cursor: pointer;
  transition: var(--t);
}
.login-btn:hover { background: var(--dourado2); }
.login-error { color: #ff8a80; font-size: .78rem; margin-top: .75rem; min-height: 1rem; }

/* ── LAYOUT ── */
#app { display: none; height: 100vh; overflow: hidden; }
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 220px;
  background: var(--marrom); display: flex; flex-direction: column;
  z-index: 100; overflow-y: auto;
}
.sidebar-logo {
  padding: 1.5rem 1.25rem 1rem;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.sidebar-logo img { height: 48px; }
.sidebar-section { padding: .75rem .75rem .25rem; font-size: .58rem; letter-spacing: 2px; color: rgba(255,255,255,.35); text-transform: uppercase; font-weight: 600; }
.nav-item {
  display: flex; align-items: center; gap: .75rem;
  padding: .7rem 1rem; margin: .15rem .5rem; border-radius: var(--radius2);
  cursor: pointer; color: rgba(255,255,255,.6); font-size: .82rem; font-weight: 500;
  transition: var(--t);
}
.nav-item:hover { background: rgba(255,255,255,.08); color: #fff; }
.nav-item.active { background: rgba(197,164,103,.2); color: var(--dourado2); font-weight: 600; }
.nav-item svg { flex-shrink: 0; }
.sidebar-footer {
  margin-top: auto; padding: 1rem 1.25rem;
  border-top: 1px solid rgba(255,255,255,.1);
  font-size: .68rem; color: rgba(255,255,255,.3);
}

/* ── MAIN ── */
.main {
  margin-left: 220px; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}
.topbar {
  background: var(--branco); border-bottom: 1px solid var(--bege);
  padding: .65rem 1.5rem; display: flex; align-items: center; gap: 1rem;
  flex-shrink: 0; z-index: 50;
}
.page-title {
  font-family: 'Montserrat', sans-serif; font-size: 1rem; font-weight: 800;
  color: var(--dourado); letter-spacing: .5px; margin-right: auto;
}
.content-area {
  flex: 1; overflow-y: auto; padding: 1.5rem;
  background: var(--fundo);
}

/* ── FILTROS ── */
.filter-wrap { position: relative; }
.filter-btn {
  display: flex; align-items: center; gap: .5rem;
  padding: .42rem .9rem; background: var(--branco); border: 1px solid var(--bege);
  border-radius: var(--radius2); font-size: .78rem; color: var(--texto);
  cursor: pointer; font-family: 'Inter', sans-serif; white-space: nowrap;
  transition: var(--t); min-width: 120px;
}
.filter-btn:hover, .filter-btn.active { border-color: var(--dourado); color: var(--marrom); }
.filter-btn svg { color: var(--texto2); flex-shrink: 0; }
.filter-dd {
  display: none; position: absolute; top: calc(100% + 5px); left: 0;
  background: var(--branco); border: 1px solid var(--bege); border-radius: var(--radius);
  box-shadow: var(--sombra2); z-index: 300; min-width: 200px; max-height: 280px;
  overflow: hidden; flex-direction: column;
}
.filter-dd.open { display: flex; }
.dd-search {
  padding: .5rem .75rem; border-bottom: 1px solid var(--bege);
}
.dd-search input {
  width: 100%; border: 1px solid var(--bege); border-radius: 7px;
  padding: .3rem .6rem; font-size: .75rem; font-family: 'Inter', sans-serif;
  outline: none; color: var(--texto);
}
.dd-search input:focus { border-color: var(--dourado); }
.dd-list { overflow-y: auto; padding: .3rem 0; }
.dd-opt {
  padding: .42rem .85rem; font-size: .78rem; cursor: pointer;
  color: var(--texto); transition: .12s;
}
.dd-opt:hover { background: var(--fundo); color: var(--marrom); }
.dd-opt.selected { color: var(--dourado); font-weight: 600; }
.dd-opt.placeholder { color: var(--texto2); font-style: italic; }

/* ── MULTI SELECT CLIENTES ── */
.ms-wrap { position: relative; }
.ms-btn {
  display: flex; align-items: center; gap: .5rem;
  padding: .42rem .9rem; background: var(--branco); border: 1px solid var(--bege);
  border-radius: var(--radius2); font-size: .78rem; color: var(--texto);
  cursor: pointer; font-family: 'Inter', sans-serif; white-space: nowrap;
  transition: var(--t); min-width: 150px;
}
.ms-btn:hover { border-color: var(--dourado); }
.ms-dd {
  display: none; position: absolute; top: calc(100% + 5px); left: 0;
  background: var(--branco); border: 1px solid var(--bege); border-radius: var(--radius);
  box-shadow: var(--sombra2); z-index: 300; min-width: 220px;
}
.ms-dd.open { display: block; }
.ms-header { padding: .5rem .75rem; border-bottom: 1px solid var(--bege); display: flex; align-items: center; gap: .5rem; }
.ms-header label { font-size: .75rem; color: var(--texto2); cursor: pointer; display: flex; align-items: center; gap: .4rem; }
.ms-list { max-height: 220px; overflow-y: auto; padding: .3rem 0; }
.ms-item { padding: .4rem .85rem; display: flex; align-items: center; gap: .5rem; cursor: pointer; font-size: .78rem; }
.ms-item:hover { background: var(--fundo); }
.ms-only { font-size: .65rem; color: var(--dourado); cursor: pointer; margin-left: auto; opacity: 0; }
.ms-item:hover .ms-only { opacity: 1; }

/* ── TOPBAR BOTÃO PDF ── */
.btn-pdf {
  display: flex; align-items: center; gap: .4rem;
  padding: .42rem .9rem; background: var(--branco); border: 1px solid var(--bege);
  border-radius: var(--radius2); font-size: .78rem; color: var(--marrom);
  cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600;
  transition: var(--t);
}
.btn-pdf:hover { background: var(--fundo); border-color: var(--dourado); }
.btn-atualizar {
  display: flex; align-items: center; gap: .35rem;
  padding: .42rem .75rem; background: none; border: none;
  font-size: .72rem; color: var(--texto2); cursor: pointer; font-family: 'Inter', sans-serif;
}
.btn-atualizar:hover { color: var(--marrom); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4CAF50; flex-shrink: 0; }

/* ── PERIODO NAV ── */
.periodo-nav {
  display: flex; align-items: center; gap: .6rem; margin-bottom: 1.25rem;
  background: var(--branco); border: 1px solid var(--bege); border-radius: var(--radius);
  padding: .55rem 1rem; width: fit-content;
}
.nav-arr {
  background: none; border: 1px solid var(--bege); border-radius: 7px;
  width: 28px; height: 28px; cursor: pointer; color: var(--marrom);
  font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
  transition: var(--t); line-height: 1;
}
.nav-arr:hover:not(:disabled) { background: var(--fundo); border-color: var(--dourado); }
.nav-arr:disabled { opacity: .3; cursor: default; }
.periodo-txt { font-size: .82rem; font-weight: 600; color: var(--marrom); display: flex; align-items: center; gap: .4rem; }
.sem-cnt { font-size: .65rem; color: var(--texto2); font-weight: 400; }

/* ── CARDS KPI ── */
.kpi-grid { display: grid; gap: 1rem; margin-bottom: 1rem; }
.g4 { grid-template-columns: repeat(4,1fr); }
.g3 { grid-template-columns: repeat(3,1fr); }
.g2 { grid-template-columns: repeat(2,1fr); }
.kpi {
  background: var(--branco); border: 1px solid var(--bege); border-radius: var(--radius);
  padding: 1.1rem 1.2rem; box-shadow: var(--sombra);
  border-left: 3px solid var(--marrom);
}
.kpi-label { font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: var(--texto2); margin-bottom: .5rem; display: flex; align-items: center; gap: .35rem; }
.kpi-val { font-family: 'Montserrat', sans-serif; font-size: 1.65rem; font-weight: 800; color: var(--marrom); line-height: 1; }
.kpi-val.sm { font-size: 1.3rem; }
.kpi-val.xs { font-size: 1.1rem; }
.kpi-sub { font-size: .68rem; color: var(--texto2); margin-top: .35rem; }
.kpi-comp { font-size: .7rem; margin-top: .4rem; font-weight: 500; }
.kpi-comp.up { color: var(--verde); }
.kpi-comp.down { color: var(--vermelho); }
.kpi-comp.neu { color: var(--texto2); }

/* ── CARDS ── */
.card {
  background: var(--branco); border: 1px solid var(--bege);
  border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--sombra);
}
.card-title {
  font-family: 'Montserrat', sans-serif; font-size: .75rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .8px; color: var(--texto2);
  margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem;
}
.card-title.gold { color: var(--dourado); }
.card-badge {
  font-size: .58rem; background: var(--fundo); border-radius: 20px;
  padding: .1rem .5rem; color: var(--texto2); font-weight: 400;
  text-transform: none; letter-spacing: 0;
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.grid-3 { display: grid; grid-template-columns: 1fr 1.1fr 1fr; gap: 1rem; margin-bottom: 1rem; }

/* ── GRÁFICOS ── */
.chart-box { margin-top: .5rem; }
.chart-box svg { display: block; width: 100%; overflow: visible; }
.chart-legend { display: flex; gap: 1.25rem; margin-bottom: .6rem; flex-wrap: wrap; }
.leg-item { display: flex; align-items: center; gap: .4rem; font-size: .68rem; color: var(--texto2); }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.leg-line { width: 16px; height: 3px; border-radius: 2px; display: inline-block; }
/* Tooltip nativo melhorado */
svg [title]:hover { opacity: .85; cursor: crosshair; }
/* Valor hover nos pontos do gráfico */
.chart-box circle:hover { r: 6; }
/* KPI card melhorado */
.kpi { transition: box-shadow .2s; }
.kpi:hover { box-shadow: 0 6px 20px rgba(92,51,23,.12); }
/* Funil */
.funil-wrap svg polygon:hover { opacity: 1 !important; filter: brightness(1.08); }

/* ── FUNIL ── */
.funil-wrap { display: flex; flex-direction: column; align-items: center; padding: .5rem 0; }
.funil-footer { font-size: .75rem; color: var(--texto2); margin-top: .75rem; }
.funil-footer strong { color: var(--marrom); }

/* ── TABELA LEADS ── */
.leads-table { width: 100%; border-collapse: collapse; font-size: .75rem; }
.leads-table th { text-align: left; padding: .4rem .6rem; color: var(--texto2); font-weight: 600; font-size: .63rem; text-transform: uppercase; letter-spacing: .4px; border-bottom: 2px solid var(--bege); }
.leads-table td { padding: .45rem .6rem; border-bottom: 1px solid var(--bege); }
.leads-table .conv { color: var(--dourado); font-weight: 600; }
.leads-table .total { font-weight: 700; background: var(--fundo); }

/* ── MARKETING ── */
.mkt-grid { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 1rem; }
.metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; margin-top: .75rem; }
.metric-box { background: var(--fundo); border-radius: 10px; padding: .65rem; text-align: center; }
.metric-val { font-family: 'Montserrat', sans-serif; font-size: 1.15rem; font-weight: 800; color: var(--marrom); }
.metric-lbl { font-size: .6rem; color: var(--texto2); text-transform: uppercase; letter-spacing: .5px; margin-top: .15rem; }
.btn-criativo {
  display: inline-flex; align-items: center; gap: .45rem;
  background: var(--dourado); color: #fff; border-radius: 9px;
  padding: .5rem 1rem; text-decoration: none; font-size: .78rem; font-weight: 700;
  margin-bottom: .75rem; transition: var(--t);
}
.btn-criativo:hover { background: var(--marrom); }
.badge-fmt {
  display: inline-block; background: var(--bege); border-radius: 20px;
  padding: .2rem .65rem; font-size: .68rem; font-weight: 600; color: var(--marrom);
  margin: .1rem;
}
.row-kv { display: flex; justify-content: space-between; font-size: .75rem; padding: .25rem 0; }

/* ── META BAR ── */
.meta-bar-wrap { margin-top: .6rem; }
.meta-bar-vals { display: flex; justify-content: space-between; font-size: .7rem; color: var(--texto2); margin-bottom: .3rem; }
.meta-bar-bg { height: 7px; background: var(--bege); border-radius: 4px; overflow: hidden; }
.meta-bar-fill { height: 100%; background: var(--dourado); border-radius: 4px; transition: width .5s; }
.meta-pct { font-size: .7rem; color: var(--marrom); font-weight: 600; margin-top: .3rem; }

/* ── ANÁLISE ── */
.analise-box {
  font-size: .8rem; line-height: 1.75; color: var(--texto);
  background: var(--fundo); border-radius: 10px; padding: .85rem 1rem;
  border-left: 3px solid var(--dourado2);
}

/* ── INSIGHTS ── */
.insights-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.insight-card {
  border-radius: var(--radius); padding: 1rem 1.1rem;
  border-left: 4px solid; background: var(--branco);
}
.insight-card.green { border-color: var(--verde); }
.insight-card.red { border-color: var(--vermelho); }
.insight-card.yellow { border-color: var(--amarelo); }
.insight-title { font-size: .82rem; font-weight: 700; margin-bottom: .35rem; }
.insight-card.green .insight-title { color: var(--verde); }
.insight-card.red .insight-title { color: var(--vermelho); }
.insight-card.yellow .insight-title { color: #b37a00; }
.insight-desc { font-size: .75rem; color: var(--texto2); line-height: 1.6; }
.insights-section-label {
  grid-column: 1/-1; display: flex; align-items: center; gap: .75rem; margin-top: .25rem;
}
.insights-section-line { flex: 1; height: 1px; background: var(--bege); }
.insights-section-txt { font-size: .6rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--dourado); }

/* ── EMPTY ── */
.empty-state { padding: 3rem; text-align: center; color: var(--texto2); }
.empty-sm { font-size: .78rem; color: var(--texto2); padding: .5rem 0; }
.error-box { background: #fff3f3; border: 1px solid #ffcdd2; border-radius: var(--radius); padding: 1.25rem; color: var(--vermelho); font-size: .85rem; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); transition: transform .3s; }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .g4 { grid-template-columns: repeat(2,1fr); }
  .g3 { grid-template-columns: repeat(2,1fr); }
  .grid-2, .grid-3, .mkt-grid { grid-template-columns: 1fr; }
  .topbar { padding: .65rem 1rem; }
  .hamburguer { display: flex !important; }
}
@media (max-width: 480px) {
  .g4, .g3 { grid-template-columns: 1fr; }
}
.hamburguer { display: none; background: none; border: none; cursor: pointer; padding: .3rem; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <img class="login-logo" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 80'%3E%3Ctext x='10' y='55' font-family='Montserrat,sans-serif' font-weight='800' font-size='36' fill='%23C5A467'%3EFIRMARE%3C/text%3E%3C/svg%3E" alt="Firmare">
    <div class="login-title">Dashboard Gerencial</div>
    <div class="login-sub">Acesso Restrito · Firmare</div>
    <input class="login-input" type="password" id="login-input" placeholder="Senha de acesso" autocomplete="off">
    <button class="login-btn" onclick="tentarLogin()">ENTRAR</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg width="130" viewBox="0 0 160 50" xmlns="http://www.w3.org/2000/svg">
        <text x="0" y="38" font-family="Montserrat,sans-serif" font-weight="800" font-size="32" fill="#C5A467">FIRMARE</text>
        <text x="2" y="50" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,.4)" letter-spacing="2">GESTÃO EMPRESARIAL</text>
      </svg>
    </div>
    <div class="sidebar-section">Módulos</div>
    <div class="nav-item active" data-modulo="financeiro" onclick="irPara('financeiro',this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Financeiro
    </div>
    <div class="nav-item" data-modulo="comercial" onclick="irPara('comercial',this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Comercial
    </div>
    <div class="nav-item" data-modulo="marketing" onclick="irPara('marketing',this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      Marketing
    </div>
    <div class="nav-item" data-modulo="trafego" onclick="irPara('trafego',this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Tráfego Pago
    </div>
    <div class="nav-item" data-modulo="insights" onclick="irPara('insights',this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Insights IA
    </div>
    <div class="sidebar-footer">
      Firmare Gestão Empresarial<br>@firmare.gestao
    </div>
  </nav>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="hamburguer" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5C3317" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="page-title" id="page-title">Financeiro</div>

      <!-- Cliente multi-select -->

<script>
// ── CONFIGURAÇÃO ─────────────────────────────────────────
const SENHA = 'gestaoFirmare2026$';
const SHEET_ID = '1fSgWk1_NkDzm8ynnboz3SGZKjJSBtfDWaXm8AulYDak';
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1fSgWk1_NkDzm8ynnboz3SGZKjJSBtfDWaXm8AulYDak/export?format=csv&gid=0';

// ── ÍNDICES DE COLUNAS — mapeados dinamicamente pelo nome ─
// Valores padrão (fallback) — serão sobrescritos ao carregar os headers reais
let C = {
  CLIENTE: 0, MES: 1, INICIO: 2, FIM: 3,
  SEGUIDORES: 4, CRIATIVOS: 5, FORMATO: 6,
  LINK_CRIATIVO: 7, VIEWS: 8, CURTIDAS: 9,
  COMENTARIOS: 10, COMPARTILHAMENTOS: 11, ALCANCE: 12,
  ANALISE_MKT: 13,
  LEADS: 14, LEADS_TRAFEGO: 15, LEADS_RECAP: 16,
  LEADS_FORA: 17, LEADS_INSTA: 18, LEADS_WHATS: 19,
  CONV_WHATS: 20, CONV_INSTA: 21,
  AGENDAMENTOS: 22, VENDAS: 23, ANALISE_LEADS: 24,
  CAMPANHAS: 25, INVESTIMENTO: 26, CPL: 27, CTR: 28,

  RECEITA: 31, DESPESAS: 32, TICKET: 33,
  TOP5: 34, ACUMULADO: 35, META: 36,
  PREV_RECEITA: 37, PREV_DESPESAS: 38
};

// Mapeia os índices pelos nomes reais dos headers
function mapearColunas(headers) {
  const NOMES = {
    CLIENTE:        ['Cliente'],
    MES:            ['Mes de Referência','Mês de Referência'],
    INICIO:         ['Início da Semana (Data da segunda-feira)'],
    FIM:            ['Fim da Semana (Data do domingo)'],
    SEGUIDORES:     ['Novos Seguidores (Instagram)'],
    CRIATIVOS:      ['Quantidade de Criativos Publicados (Total da semana)'],
    FORMATO:        ['Formato Predominante (Vídeos, Cards ou Carrosséis)','Formato Predominante (Vídeos'],
    LINK_CRIATIVO:  ['Link do Melhor Criativo (Performance)'],
    VIEWS:          ['Visualizações (Melhor Criativo'],

    CPL:            ['CPL Médio (Custo por Lead)'],
    CTR:            ['CTR Médio (Taxa de Clique)'],
    ROAS:           ['ROAS (Retorno sobre Investimento)'],
    ANALISE_TRAFEGO:['Análise Estratégica de Tráfego'],
    RECEITA:        ['Receita Bruta da Semana'],

    PREV_DESPESAS:  ['Previsão de Despesas (Próxima semana)'],
  };
  const clean = headers.map(h => h.trim().replace(/⁠/g,''));
  const novo = {...C};
  Object.entries(NOMES).forEach(([key, nomes]) => {
    for (const nome of nomes) {
      // Busca exata primeiro
      let idx = headers.findIndex(h => h.trim() === nome || h.trim().replace(/⁠/g,'') === nome);
      // Busca parcial se não achar
      if (idx === -1) idx = clean.findIndex(h => h.startsWith(nome.substring(0,20)));
      if (idx !== -1) { novo[key] = idx; break; }
    }
  });
  console.log('[Colunas mapeadas]', novo);
  return novo;
}

// ── ESTADO ────────────────────────────────────────────────
let ROWS = [];       // linhas brutas do CSV
let HEADERS = [];    // headers
let clientesSel = [];
let moduloAtivo = 'financeiro';
let semanaIdx = 0;
let filtroInicio = '';
let filtroFim = '';

// ── PARSER CSV RFC 4180 ───────────────────────────────────
function parseCSV(text) {
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const rows = [];
  let row = [], val = '', inQ = false, i = 0;
  const N = text.length;
  while (i <= N) {
    const ch = i < N ? text[i] : '\n';
    if (ch === '"') {
      if (inQ && i+1 < N && text[i+1] === '"') { val += '"'; i += 2; continue; }
      inQ = !inQ; i++; continue;
    }
    if (ch === ',' && !inQ) { row.push(val.trim()); val = ''; i++; continue; }
    if ((ch === '\n' && !inQ) || i === N) {
      row.push(val.trim()); val = '';
      if (row.some(c => c !== '')) rows.push(row);
      row = []; i++; continue;
    }
    val += ch; i++;
  }
  return rows;
}

// ── ACESSO A COLUNA POR ÍNDICE ────────────────────────────
function c(row, idx) {
  if (!row || idx >= row.length) return '';
  return (row[idx] || '').trim();
}

// ── PARSE NUMÉRICO ────────────────────────────────────────
function num(v) {
  if (v === null || v === undefined || v === '') return null;
  if (typeof v === 'number') return isNaN(v) ? null : v;
  let s = String(v).trim();
  // Se já é número JS (ponto decimal, sem vírgula), retornar direto
  if (/^-?\d+\.\d+$/.test(s) || /^-?\d+$/.test(s)) return parseFloat(s);
  // Formato brasileiro: R$ 82.193,88 → remove R$, pontos de milhar, troca vírgula
  s = s.replace(/R\$\s*/g, '')
       .replace(/\s/g, '');
  // Se tem vírgula (formato pt-BR): pontos são milhar
  if (s.includes(',')) {
    s = s.replace(/\./g, '').replace(',', '.');
  }
  // Se não tem vírgula mas tem ponto: pode ser decimal (ex: "82193.88") ou milhar (ex: "82.193")
  // Heurística: se só tem 3 dígitos após o ponto → milhar; senão → decimal
  else if (s.includes('.')) {
    const parts = s.split('.');
    if (parts[parts.length-1].length === 3) s = s.replace(/\./g, ''); // milhar
    // else: ponto decimal, manter como está
  }
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

// ── PARSE DATA ────────────────────────────────────────────
function parseData(s) {
  if (!s) return null;
  const p = String(s).split('/');
  if (p.length === 3) return new Date(+p[2], +p[1]-1, +p[0]);
  return null;
}

// ── FORMATADORES ──────────────────────────────────────────
const MESES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

function fBRL(v) {
  const n = num(v);
  return n !== null ? 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—';
}
function fNum(v) {
  const n = num(v);
  return n !== null ? n.toLocaleString('pt-BR') : '—';
}
function fNumBig(v) {
  const n = num(v);
  if (n === null) return '—';
  if (n >= 1000000) return (n / 1000000).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}) + 'Mi';
  return n.toLocaleString('pt-BR');
}
function fPct(n) {
  return n !== null ? n.toFixed(1) + '%' : '—';
}
function fCTR(v) {
  const n = num(v);
  if (n === null) return '—';
  return n < 1 ? fPct(n * 100) : fPct(n);
}
function humData(s) {
  if (!s) return '';
  const p = s.split('/');
  if (p.length !== 3) return s;
  return p[0] + ' ' + MESES[+p[1]-1];
}

// ── COMPARATIVO ───────────────────────────────────────────
function comp(atual, ant) {
  const a = num(atual), b = num(ant);
  if (a === null || b === null) return '<div class="kpi-comp neu">— sem comparativo</div>';
  if (b === 0) return '<div class="kpi-comp neu">— sem comparativo</div>';
  const d = ((a - b) / Math.abs(b) * 100).toFixed(1);
  const up = a >= b;
  return `<div class="kpi-comp ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(d)}% vs período ant.</div>`;
}

// ── FILTRAR REGISTROS ─────────────────────────────────────
function registrosFiltrados() {
  let rows = ROWS;
  if (clientesSel.length > 0)
    rows = rows.filter(r => clientesSel.includes(c(r, C.CLIENTE)));
  const dI = filtroInicio ? parseData(filtroInicio) : null;
  const dF = filtroFim ? parseData(filtroFim) : null;
  if (dI) rows = rows.filter(r => { const d = parseData(c(r, C.INICIO)); return d && d >= dI; });
  if (dF) rows = rows.filter(r => { const d = parseData(c(r, C.FIM)); return d && d <= dF; });
  return rows.sort((a, b) => (parseData(c(b, C.INICIO)) || 0) - (parseData(c(a, C.INICIO)) || 0));
}

// ── CONSOLIDAR MÚLTIPLOS CLIENTES POR SEMANA ─────────────
function consolidar(rows) {
  if (!rows || !rows.length) return null;
  if (rows.length === 1) return { _row: rows[0], _tipo: 'single' };
  // Somar campos numéricos
  const SOMA = [C.SEGUIDORES,C.CRIATIVOS,C.VIEWS,C.CURTIDAS,C.COMENTARIOS,
    C.COMPARTILHAMENTOS,C.ALCANCE,C.LEADS,C.LEADS_TRAFEGO,C.LEADS_RECAP,
    C.LEADS_FORA,C.LEADS_INSTA,C.LEADS_WHATS,C.CONV_WHATS,C.CONV_INSTA,
    C.AGENDAMENTOS,C.VENDAS,C.CAMPANHAS,C.INVESTIMENTO,
    C.RECEITA,C.DESPESAS,C.ACUMULADO,C.META];
  const MEDIA = [C.TICKET,C.CPL,C.CTR];
  const merged = [...rows[0]]; // cópia da primeira linha
  SOMA.forEach(idx => {
    const total = rows.reduce((s, r) => s + (num(c(r, idx)) || 0), 0);
    merged[idx] = total > 0 ? String(total) : '';
  });
  MEDIA.forEach(idx => {
    const vals = rows.map(r => num(c(r, idx))).filter(v => v !== null);
    merged[idx] = vals.length > 0 ? String(vals.reduce((s,v) => s+v, 0) / vals.length) : '';
  });
  // Campos de texto: pegar primeira linha que tem valor
  const TEXT = [C.FORMATO,C.LINK_CRIATIVO,C.ANALISE_MKT,C.ANALISE_LEADS,C.ANALISE_TRAFEGO,C.TOP5,C.INICIO,C.FIM,C.MES];
  TEXT.forEach(idx => {
    for (const r of rows) {
      const v = c(r, idx);
      if (v && v !== 'nan') { merged[idx] = v; break; }
    }
  });
  return { _row: merged, _tipo: 'merged' };
}

// ── AGRUPAR POR SEMANA ────────────────────────────────────
function agruparPorSemana(rows) {
  const map = {}, keys = [];
  rows.forEach(r => {
    const k = c(r, C.INICIO) || 'sem-data';
    if (!map[k]) { map[k] = []; keys.push(k); }
    map[k].push(r);
  });
  keys.sort((a, b) => (parseData(b) || 0) - (parseData(a) || 0));
  return { map, keys };
}

// ── RENDER PRINCIPAL ──────────────────────────────────────
function render() {
  const el = document.getElementById('content');
  if (!el) return;

  const filtrados = registrosFiltrados();
  const { map, keys } = agruparPorSemana(filtrados);

  if (!keys.length) {
    el.innerHTML = '<div class="empty-state">Nenhum dado para os filtros selecionados.</div>';
    return;
  }

  semanaIdx = Math.min(semanaIdx, keys.length - 1);
  const k = keys[semanaIdx];
  const kAnt = keys[semanaIdx + 1] || null;

  const reg = consolidar(map[k]);
  const regAnt = kAnt ? consolidar(map[kAnt]) : null;

  // Todos os registros consolidados para gráficos (respeitando filtro de cliente)
  const todosRows = clientesSel.length > 0
    ? ROWS.filter(r => clientesSel.includes(c(r, C.CLIENTE)))
    : ROWS;
  const { map: todoMap, keys: todoKeys } = agruparPorSemana(todosRows);
  const todosConsol = todoKeys.map(k2 => consolidar(todoMap[k2]));

  // Registros do período filtrado para gráficos de histórico das outras abas
  const { map: filtMap, keys: filtKeys } = agruparPorSemana(filtrados);
  const filtConsol = filtKeys.map(k2 => consolidar(filtMap[k2]));

  // Header de navegação
  const di = c(reg._row, C.INICIO);
  const df = c(reg._row, C.FIM);
  const periodo = di && df ? `${humData(di)} → ${humData(df)}` : di || '—';

  const navHTML = `<div class="periodo-nav">
    <div class="periodo-txt">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      ${periodo}
    </div>
  </div>`;

  try {
    let html = '';
    if (moduloAtivo === 'financeiro') html = renderFinanceiro(reg, regAnt, todosConsol);
    else if (moduloAtivo === 'comercial') html = renderComercial(reg, regAnt, filtConsol);
    else if (moduloAtivo === 'marketing') html = renderMarketing(reg, regAnt, filtConsol);
    else if (moduloAtivo === 'trafego') html = renderTrafego(reg, regAnt, filtConsol);
    else if (moduloAtivo === 'insights') html = renderInsights(reg, regAnt, filtConsol);
    el.innerHTML = navHTML + html;
  } catch(e) {
    console.error(e);
    el.innerHTML = navHTML + `<div class="error-box"><strong>Erro ao carregar módulo.</strong><br><small>${e.message}</small></div>`;
  }
}

function navSemana(d) { semanaIdx = Math.max(0, semanaIdx - d); render(); }

// ── GRÁFICO: LINHA SIMPLES ────────────────────────────────
function grafLinha(consols, idxCol, fmtFn, color) {
  color = color || '#5C3317';
  const pts = consols.slice(0, 8).reverse();
  const vals = pts.map(r => num(c(r._row, idxCol)) || 0);
  const maxV = Math.max(...vals, 1);
  const W = 400, H = 90, pad = 14;
  const coords = vals.map((v, i) => ({
    x: pad + (i / (vals.length - 1 || 1)) * (W - 2 * pad),
    y: H - pad - (v / maxV) * (H - 2 * pad),
    v: v
  }));
  const pathD = 'M ' + coords.map(p => p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' L ');
  const areaD = 'M ' + coords[0].x.toFixed(1) + ',' + H +
    ' L ' + coords.map(p => p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' L ') +
    ' L ' + coords[coords.length-1].x.toFixed(1) + ',' + H + ' Z';
  const labels = pts.map((r, i) => {
    const d = c(r._row, C.INICIO);
    return '<text x="' + coords[i].x.toFixed(1) + '" y="' + (H+14) + '" text-anchor="middle" font-size="9" fill="#7A6555">' + (d ? d.slice(0,5) : 'S'+(i+1)) + '</text>';
  }).join('');
  const dots = coords.map((p, i) =>
    '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="' + (i === coords.length-1-semanaIdx ? 4 : 2.5) + '" fill="' + color + '" opacity="' + (i === coords.length-1-semanaIdx ? 1 : .65) + '"><title>' + fmtFn(p.v) + '</title></circle>'
  ).join('');
  // Tooltip overlay por ponto
  let tipBars = '';
  coords.forEach((p, i) => {
    const d2 = c(pts[i]._row, C.INICIO);
    tipBars += '<rect x="' + (p.x - 18).toFixed(1) + '" y="0" width="36" height="' + H + '" fill="transparent"><title>' + (d2 ? d2 + ': ' : '') + fmtFn(p.v) + '</title></rect>';
  });
  return '<div class="chart-box" style="overflow:hidden">' +
    '<svg viewBox="0 0 ' + W + ' ' + (H+18) + '" width="100%" height="150" preserveAspectRatio="xMidYMid meet">' +
    '<defs><linearGradient id="glg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + color + '" stop-opacity=".15"/><stop offset="100%" stop-color="' + color + '" stop-opacity="0"/></linearGradient></defs>' +
    '<path d="' + areaD + '" fill="url(#glg)"/>' +
    '<path d="' + pathD + '" fill="none" stroke="' + color + '" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>' +
    dots + labels + tipBars +
    '</svg></div>';
}

// ── GRÁFICO: LINHA DUPLA ──────────────────────────────────
function grafLinhaDupla(consols, idxA, idxB, lblA, lblB, fmtA, fmtB, cA, cB) {
  cA = cA || '#5C3317'; cB = cB || '#C5A467';
  const pts = consols.slice(0, 8).reverse();
  const vA = pts.map(r => num(c(r._row, idxA)));
  const vB = pts.map(r => num(c(r._row, idxB)));
  const allV = [...vA, ...vB].filter(v => v !== null);
  const maxV = Math.max(...allV, 1);
  const W = 400, H = 90, pad = 14;
  function mkCoords(vals) {
    return vals.map((v, i) => ({
      x: pad + (i / (vals.length - 1 || 1)) * (W - 2 * pad),
      y: v !== null ? H - pad - (v / maxV) * (H - 2 * pad) : null,
      v: v
    }));
  }
  const coorA = mkCoords(vA), coorB = mkCoords(vB);
  function mkPath(coors, color, dash) {
    const valid = coors.filter(p => p.y !== null);
    if (!valid.length) return '';
    const d = 'M ' + valid.map(p => p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' L ');
    return '<path d="' + d + '" fill="none" stroke="' + color + '" stroke-width="2.5" stroke-dasharray="' + (dash||'') + '" stroke-linejoin="round" stroke-linecap="round"/>';
  }
  const labels = pts.map((r, i) => {
    const d = c(r._row, C.INICIO);
    return '<text x="' + coorA[i].x.toFixed(1) + '" y="' + (H+14) + '" text-anchor="middle" font-size="9" fill="#7A6555">' + (d ? d.slice(0,5) : 'S'+(i+1)) + '</text>';
  }).join('');
  const dotsA = coorA.map(p => p.y !== null ? '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="3" fill="' + cA + '"><title>' + lblA + ': ' + fmtA(p.v) + '</title></circle>' : '').join('');
  const dotsB = coorB.map(p => p.y !== null ? '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="3" fill="' + cB + '"><title>' + lblB + ': ' + fmtB(p.v) + '</title></circle>' : '').join('');
  const legend = '<div class="chart-legend"><div class="leg-item"><span class="leg-dot" style="background:' + cA + '"></span>' + lblA + '</div><div class="leg-item"><span class="leg-line" style="background:' + cB + '"></span>' + lblB + '</div></div>';
  // Tooltip overlay — barras verticais invisíveis por ponto
  let tooltipBars = '';
  pts.forEach((r, i) => {
    const tipA = vA[i] !== null ? lblA + ': ' + fmtA(vA[i]) : '';
    const tipB = vB[i] !== null ? lblB + ': ' + fmtB(vB[i]) : '';
    const tip = [tipA, tipB].filter(Boolean).join(' | ');
    const d2 = c(r._row, C.INICIO);
    tooltipBars += '<rect x="' + (coorA[i].x - 18).toFixed(1) + '" y="0" width="36" height="' + H + '" fill="transparent"><title>' + (d2?d2+' — ':'') + tip + '</title></rect>';
  });
  return '<div class="chart-box" style="overflow:hidden">' + legend +
    '<svg viewBox="0 0 ' + W + ' ' + (H+18) + '" width="100%" height="150" preserveAspectRatio="xMidYMid meet">' +
    mkPath(coorA, cA, '') + mkPath(coorB, cB, '6 3') +
    dotsA + dotsB + labels + tooltipBars +
    '</svg></div>';
}

// ── GRÁFICO: BARRAS ───────────────────────────────────────
function grafBarras(consols, idxCol, fmtFn, color) {
  color = color || 'var(--marrom)';
  const pts = consols.slice(0, 6).reverse();
  const vals = pts.map(r => num(c(r._row, idxCol)) || 0);
  const maxV = Math.max(...vals, 1);
  const n = pts.length;
  const W = 420, H = 140, topPad = 24, botPad = 24;
  const plotH = H - topPad - botPad;
  const bW = Math.floor((W - 40) / n * 0.55);
  const gap = Math.floor((W - 40 - bW * n) / (n + 1));
  let bars = '', lbls = '';
  pts.forEach((r, i) => {
    const x = 20 + gap + i * (bW + gap);
    const h = Math.max(4, (vals[i] / maxV) * plotH);
    const y = topPad + plotH - h;
    const d = c(r._row, C.INICIO);
    const lbl = d ? d.slice(0,5) : 'S'+(i+1);
    bars += '<rect x="' + x + '" y="' + y.toFixed(1) + '" width="' + bW + '" height="' + h.toFixed(1) + '" fill="' + color + '" rx="3"><title>' + fmtFn(vals[i]) + '</title></rect>';
    // valor acima da barra
    const label = vals[i] > 9999 ? (vals[i]/1000).toFixed(1)+'k' : vals[i] > 0 ? String(vals[i]) : '';
    if (h > 18 && label) bars += '<text x="' + (x + bW/2).toFixed(1) + '" y="' + (y - 5).toFixed(1) + '" text-anchor="middle" font-size="10" font-weight="700" fill="var(--marrom)">' + label + '</text>';
    // data embaixo
    lbls += '<text x="' + (x + bW/2).toFixed(1) + '" y="' + (H - 6) + '" text-anchor="middle" font-size="10" fill="#7A6555">' + lbl + '</text>';
  });
  return '<div class="chart-box" style="overflow:hidden"><svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" height="170" preserveAspectRatio="xMidYMid meet">' + bars + lbls + '</svg></div>';
}

// ── FINANCEIRO ────────────────────────────────────────────
function renderFinanceiro(reg, regAnt, todosConsol) {
  const row = reg._row;
  const rowA = regAnt ? regAnt._row : null;
  const recN = num(c(row, C.RECEITA));
  const despN = num(c(row, C.DESPESAS));
  const resN = recN !== null && despN !== null ? recN - despN : null;
  const vN = num(c(row, C.VENDAS));
  const tickN = num(c(row, C.TICKET)) || (recN && vN > 0 ? recN / vN : null);
  const acumN = num(c(row, C.ACUMULADO));
  const metaN = num(c(row, C.META));
  const roiN = despN && despN > 0 && resN !== null ? resN / despN * 100 : null;
  const pctMeta = metaN && metaN > 0 && acumN !== null ? Math.min(100, acumN / metaN * 100) : null;
  const top5 = c(row, C.TOP5);

  function kpi(icon, label, val, valN, comp_, sub, cor) {
    return '<div class="kpi"><div class="kpi-label">' + (icon?icon+' ':'') + label + '</div>' +
      '<div class="kpi-val' + (val && val.length > 10 ? ' sm' : '') + '"' + (cor?' style="color:'+cor+'"':'') + '>' + (val||'—') + '</div>' +
      (sub ? '<div class="kpi-sub">' + sub + '</div>' : '') +
      (comp_ || '') + '</div>';
  }

  // Progress meta
  let progressHTML = '<div class="kpi-sub">Preencha a meta na planilha</div>';
  if (metaN) {
    progressHTML = '<div class="meta-bar-wrap">' +
      '<div class="meta-bar-vals"><span>' + fBRL(acumN) + '</span><span>' + fBRL(metaN) + '</span></div>' +
      '<div class="meta-bar-bg"><div class="meta-bar-fill" style="width:' + (pctMeta||0).toFixed(1) + '%"></div></div>' +
      '<div class="meta-pct">' + (pctMeta ? pctMeta.toFixed(1) + '% atingido' : '—') + '</div>' +
      '</div>';
  }

  // Gráfico histórico (TODAS as semanas, sem filtro de período)
  const grafHist = grafLinhaDupla(todosConsol, C.RECEITA, C.DESPESAS, 'Receita', 'Despesas', fBRL, fBRL, '#5C3317', '#C5A467');

  // Top 5
  // Top5 — texto completo, sem truncamento
  const top5Fmt = top5 ? top5
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>')
    .replace(/^\s*\d+[\.\)\-]\s*/gm, '<span style="color:var(--dourado);font-weight:700;margin-right:.3rem">▸</span>')
    : '';
  const top5HTML = top5Fmt
    ? '<div class="analise-box" style="max-height:none">' + top5Fmt + '</div>'
    : '<div class="empty-sm">Preencha o campo "Top 5 Vendas" na planilha</div>';

  return '<div class="kpi-grid g4">' +
    kpi('🔥','Receita Bruta', fBRL(recN), recN, comp(recN, rowA ? num(c(rowA, C.RECEITA)) : null)) +
    kpi('💸','Despesas', fBRL(despN), despN, comp(despN, rowA ? num(c(rowA, C.DESPESAS)) : null)) +
    kpi('📊','Resultado Líquido', fBRL(resN), resN, comp(resN, rowA ? num(c(rowA,C.RECEITA))-num(c(rowA,C.DESPESAS)) : null), 'Receita − Despesas', resN !== null ? (resN >= 0 ? 'var(--verde)' : 'var(--vermelho)') : '') +
    kpi('🏷️','Ticket Médio', fBRL(tickN), tickN, comp(tickN, rowA ? num(c(rowA, C.TICKET)) : null)) +
    '</div>' +
    '<div class="kpi-grid g3" style="margin-bottom:1.5rem">' +
    kpi('🛒','Nº de Vendas', c(row, C.VENDAS)||'—', vN, comp(vN, rowA ? num(c(rowA, C.VENDAS)) : null)) +
    kpi('📈','ROI', roiN !== null ? roiN.toFixed(1)+'%' : '—', roiN, comp(roiN, null), '(Receita − Despesas) ÷ Despesas', roiN !== null ? (roiN >= 0 ? 'var(--verde)' : 'var(--vermelho)') : '') +
    '<div class="kpi"><div class="kpi-label">🗓️ Faturamento Acumulado vs Meta</div>' +
    '<div class="kpi-val xs">' + fBRL(acumN) + '</div>' +
    progressHTML + '</div>' +
    '</div>' +
    '<div class="grid-2">' +
    '<div class="card"><div class="card-title"><span style="margin-right:.4rem">📈</span>Histórico · Receita vs Despesas <span class="card-badge">todas as semanas</span></div>' + grafHist + '</div>' +
    '<div class="card"><div class="card-title">Detalhes Top Vendas</div>' + top5HTML + '</div>' +
    '</div>';
}

// ── COMERCIAL ─────────────────────────────────────────────
function renderComercial(reg, regAnt, filtConsol) {
  const row = reg._row;
  const rowA = regAnt ? regAnt._row : null;
  const lN = num(c(row, C.LEADS)) || 0;
  const aN = num(c(row, C.AGENDAMENTOS)) || 0;
  const vN = num(c(row, C.VENDAS)) || 0;
  const recapN = num(c(row, C.LEADS_RECAP)) || 0;
  const foraN = num(c(row, C.LEADS_FORA)) || 0;
  const lInstaV = c(row, C.LEADS_INSTA);
  const lWhatsV = c(row, C.LEADS_WHATS);
  const cInsta = c(row, C.CONV_INSTA);
  const cWhats = c(row, C.CONV_WHATS);
  const analise = c(row, C.ANALISE_LEADS);
  // Qualificados = Leads Recebidos - Fora de Perfil
  const qualN = Math.max(0, lN - foraN);
  // Total canais = Instagram + WhatsApp + Recaptação
  const lInstaN = num(lInstaV) || 0;
  const lWhatsN = num(lWhatsV) || 0;
  const totalCanais = lInstaN + lWhatsN + recapN;
  const taxaTotal = lN > 0 ? (vN / lN * 100).toFixed(1) : null;

  function pctCanal(n, d) {
    const nN = num(n) || 0, dN = num(d) || 0;
    return dN > 0 ? (nN / dN * 100).toFixed(0) + '%' : '—';
  }

  // Funil estilo barras horizontais — label sempre fora, valor sempre visível
  const fSteps = [
    { label: 'Leads Recebidos', val: lN,    color: '#5C3317', colorLight: '#F0E8DF' },
    { label: 'Qualificados',    val: qualN,  color: '#7A4520', colorLight: '#EDE0D4' },
    { label: 'Agendamentos',    val: aN,     color: '#A0622A', colorLight: '#E8D5C0' },
    { label: 'Vendas',          val: vN,     color: '#C5A467', colorLight: '#F5EDD8' }
  ];
  const baseVal = fSteps[0].val || 1;
  // Funil trapezoidal SVG
  const SVG_W = 420, STEP_H = 72, GAP = 6;
  const TOP_W = SVG_W;         // largura do topo (100%)
  const BOT_W = 80;            // largura mínima do fundo
  const SVG_H = fSteps.length * STEP_H + (fSteps.length - 1) * GAP + 32;
  const cx = SVG_W / 2;
  let funilParts = '';
  fSteps.forEach((s, i) => {
    const pctTop = i === 0 ? 1 : (fSteps[i-1].val || 0) / baseVal;
    const pctBot = s.val / baseVal;
    const wTop = BOT_W + (TOP_W - BOT_W) * pctTop;
    const wBot = Math.max(BOT_W, BOT_W + (TOP_W - BOT_W) * pctBot);
    const xTop = cx - wTop / 2;
    const xBot = cx - wBot / 2;
    const y = i * (STEP_H + GAP);
    const yBot = y + STEP_H;
    // Trapézio
    const pts = `${xTop.toFixed(1)},${y} ${(xTop+wTop).toFixed(1)},${y} ${(xBot+wBot).toFixed(1)},${yBot} ${xBot.toFixed(1)},${yBot}`;
    funilParts += '<polygon points="' + pts + '" fill="' + s.color + '" opacity="' + (0.72 + i * 0.07) + '"/>';
    // Seta de separação (exceto última)
    if (i < fSteps.length - 1) {
      const arrowY = yBot + GAP / 2;
      funilParts += '<polygon points="' + cx + ',' + (arrowY+7) + ' ' + (cx-7) + ',' + (arrowY-1) + ' ' + (cx+7) + ',' + (arrowY-1) + '" fill="' + s.color + '" opacity=".35"/>';
    }
    // Label (acima do trapézio nos primeiros, sobreposto nos demais)
    const labelY = y + STEP_H / 2 - 8;
    const valY = y + STEP_H / 2 + 12;
    const prevVal2 = i > 0 ? fSteps[i-1].val : null;
    const taxaStr = prevVal2 && prevVal2 > 0 ? (s.val / prevVal2 * 100).toFixed(0) + '%' : '100%';
    // Nome da etapa
    funilParts += '<text x="' + cx + '" y="' + labelY + '" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle" opacity=".9">' + s.label + '</text>';
    // Valor + taxa
    funilParts += '<text x="' + cx + '" y="' + valY + '" font-family="Montserrat,sans-serif" font-size="18" font-weight="900" fill="#fff" text-anchor="middle">' + s.val + '<tspan font-size="11" font-weight="600" opacity=".8">  ' + taxaStr + '</tspan></text>';
  });
  const funilSVG = '<div style="display:flex;justify-content:center"><svg viewBox="0 0 ' + SVG_W + ' ' + SVG_H + '" width="100%" style="display:block;max-width:420px">' + funilParts + '</svg></div>';

  // Tabela canais — total = soma dos canais, sem taxa conv
  const tabela = '<table class="leads-table">' +
    '<thead><tr><th>Canal</th><th>Recebidos</th><th>%</th></tr></thead>' +
    '<tbody>' +
    '<tr><td>📸 Instagram</td><td>' + (lInstaN||'—') + '</td><td>' + pctCanal(lInstaN,totalCanais) + '</td></tr>' +
    '<tr><td>💬 WhatsApp</td><td>' + (lWhatsN||'—') + '</td><td>' + pctCanal(lWhatsN,totalCanais) + '</td></tr>' +
    '<tr><td>🔄 Recaptação</td><td>' + (recapN||'—') + '</td><td>' + pctCanal(recapN,totalCanais) + '</td></tr>' +
    '<tr class="total"><td><strong>Total</strong></td><td><strong>' + (totalCanais||'—') + '</strong></td><td><strong>100%</strong></td></tr>' +
    '</tbody></table>';

  return '<div class="kpi-grid g4">' +
    '<div class="kpi"><div class="kpi-label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;color:var(--dourado)"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Total de Leads (Semana)</div><div class="kpi-val">' + (lN||'—') + '</div>' + comp(lN, rowA ? num(c(rowA,C.LEADS)) : null) + '</div>' +
    '<div class="kpi"><div class="kpi-label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;color:var(--dourado)"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Agendamentos</div><div class="kpi-val sm">' + (aN||'—') + '</div>' + comp(aN, rowA ? num(c(rowA,C.AGENDAMENTOS)) : null) + '</div>' +
    '<div class="kpi"><div class="kpi-label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;color:var(--dourado)"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>Vendas Realizadas</div><div class="kpi-val sm">' + (vN||'—') + '</div>' + comp(vN, rowA ? num(c(rowA,C.VENDAS)) : null) + '</div>' +
    '<div class="kpi"><div class="kpi-label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;color:var(--dourado)"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Taxa Lead → Venda</div><div class="kpi-val sm">' + (taxaTotal ? taxaTotal+'%' : '—') + '</div><div class="kpi-sub">' + vN + ' vendas / ' + lN + ' leads</div></div>' +
    '</div>' +
    '<div class="grid-2">' +
    '<div class="card"><div class="card-title"><span style="margin-right:.4rem">🔽</span>Funil de Conversão</div>' +
    '<div class="funil-wrap">' + funilSVG + '</div>' +
    '<div class="funil-footer">Taxa total: <strong>' + (taxaTotal ? taxaTotal+'%' : '—') + '</strong>' + (foraN ? ' · ' + foraN + ' fora do perfil' : '') + '</div>' +
    '</div>' +
    '<div class="card"><div class="card-title"><span style="margin-right:.4rem">📡</span>Leads por Canal</div>' +
    tabela +
    '<div class="card-title" style="margin-top:1.25rem"><span style="margin-right:.4rem">👥</span>Histórico · Leads Semanais</div>' +
    grafBarras(filtConsol, C.LEADS, v => v + ' leads') +
    '</div>' +
    '</div>' +
    (analise ? '<div class="card"><div class="card-title gold">Análise Estratégica de Leads</div><div class="analise-box">' + analise + '</div></div>' : '');
}

// ── MARKETING ─────────────────────────────────────────────
function renderMarketing(reg, regAnt, filtConsol) {
  const row = reg._row;
  const rowA = regAnt ? regAnt._row : null;
  const segN = num(c(row, C.SEGUIDORES));
  const criaV = c(row, C.CRIATIVOS);
  const fmtV = c(row, C.FORMATO);
  const linkV = c(row, C.LINK_CRIATIVO);
  const viewsV = c(row, C.VIEWS);
  const curtV = c(row, C.CURTIDAS);
  const comentV = c(row, C.COMENTARIOS);
  const compartV = c(row, C.COMPARTILHAMENTOS);
  const alcanceV = c(row, C.ALCANCE);
  const analise = c(row, C.ANALISE_MKT);
  const curtN = num(curtV) || 0;
  const comentN = num(comentV) || 0;
  const engPct = segN && segN > 0 ? ((curtN + comentN) / segN * 100).toFixed(1) + '%' : '—';

  // Link criativo — pegar o mais recente com valor
  let linkFinal = linkV;
  for (const r of filtConsol) {
    const lv = c(r._row, C.LINK_CRIATIVO);
    if (lv && (lv.startsWith('http') || lv.startsWith('www'))) { linkFinal = lv; break; }
  }
  if (linkFinal && !linkFinal.startsWith('http')) linkFinal = 'https://' + linkFinal;

  const btnCriativo = linkFinal
    ? '<a href="' + linkFinal + '" target="_blank" rel="noopener noreferrer" class="btn-criativo"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> Abrir Criativo Destaque</a>'
    : '<div class="empty-sm">Sem link cadastrado</div>';

  const fmtBadges = fmtV
    ? fmtV.split(/[,;]/).map(f => '<span class="badge-fmt">' + f.trim() + '</span>').join(' ')
    : '—';

  function mbox(val, label) {
    return '<div class="metric-box"><div class="metric-val">' + (val||'—') + '</div><div class="metric-lbl">' + label + '</div></div>';
  }

  return '<div class="kpi-grid g3">' +
    '<div class="kpi"><div class="kpi-label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;color:var(--dourado)"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="23" y1="11" x2="17" y2="11"/><line x1="20" y1="8" x2="20" y2="14"/></svg>Novos Seguidores</div><div class="kpi-val">' + fNum(segN) + '</div>' + comp(segN, rowA ? num(c(rowA,C.SEGUIDORES)) : null) + '</div>' +
    '<div class="kpi"><div class="kpi-label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;color:var(--dourado)"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>Criativos Publicados</div><div class="kpi-val sm">' + (criaV||'—') + '</div>' + (fmtV?'<div class="kpi-sub">'+fmtV+'</div>':'') + '</div>' +
    '<div class="kpi"><div class="kpi-label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;color:var(--dourado)"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Engajamento</div><div class="kpi-val sm">' + engPct + '</div><div class="kpi-sub">(Curtidas + Coment.) ÷ Seguidores</div></div>' +
    '</div>' +
    '<div class="mkt-grid">' +
    // Col esquerda
    '<div style="display:flex;flex-direction:column;gap:1rem">' +
    '<div class="card"><div class="card-title">Formato / Qtd</div><div style="margin:.4rem 0">' + fmtBadges + '</div><div class="row-kv"><span>Publicados</span><strong>' + (criaV||'—') + '</strong></div></div>' +
    (analise ? '<div class="card" style="flex:1"><div class="card-title gold">Análise Estratégica</div><div class="analise-box">' + analise + '</div></div>' : '') +
    '</div>' +
    // Col centro
    '<div class="card"><div class="card-title">Criativo Destaque da Semana</div>' +
    btnCriativo +
    '<div class="metrics-grid">' +
    mbox(fNumBig(alcanceV), 'Alcance') +
    mbox(fNumBig(viewsV), 'Visualizações') +
    mbox(curtV, 'Curtidas') +
    mbox(comentV, 'Comentários') +
    mbox(compartV, 'Compartilhamentos') +
    mbox(fNum(segN), 'Seguidores') +
    '</div></div>' +
    // Col direita
    '<div class="card"><div class="card-title"><span style="margin-right:.4rem">📊</span>Histórico · Seguidores</div>' +
    grafLinha(filtConsol, C.SEGUIDORES, fNum) +
    '<div style="margin-top:.75rem">' +
    '<div class="row-kv"><span>Curtidas (semana)</span><strong>' + (curtV||'—') + '</strong></div>' +

// ── TRÁFEGO PAGO ──────────────────────────────────────────
function renderTrafego(reg, regAnt, filtConsol) {
  const row = reg._row;
  const rowA = regAnt ? regAnt._row : null;

  const invN = num(c(row, C.INVESTIMENTO));
  const cplN = num(c(row, C.CPL));
  const ctrN = num(c(row, C.CTR));
  const recN = num(c(row, C.RECEITA));
  const campV = c(row, C.CAMPANHAS);
  const analise = c(row, C.ANALISE_TRAFEGO);
  const roasN = invN && invN > 0 && recN !== null ? (recN - invN) / invN * 100 : null;
  const ctrFmt = ctrN !== null ? (ctrN < 1 ? (ctrN*100).toFixed(1)+'%' : ctrN.toFixed(1)+'%') : '—';

  // Gráfico Investimento (barras) + ROAS (linha pontilhada)
  function grafInvRoas(consols) {
    const pts = consols.slice(0, 6).reverse();
    const invVals = pts.map(r => num(c(r._row, C.INVESTIMENTO)) || 0);
    const recVals = pts.map(r => num(c(r._row, C.RECEITA)));
    const roasVals = pts.map((_, i) => invVals[i] > 0 && recVals[i] !== null ? (recVals[i]-invVals[i])/invVals[i]*100 : null);
    const maxInv = Math.max(...invVals, 1);
    const roasValid = roasVals.filter(v => v !== null);
    const maxRoas = Math.max(...roasValid.map(Math.abs), 1);
    const W = 400, H = 130, botPad = 22, topPad = 10;
    const n = pts.length;
    const bW = Math.floor((W - 40) / n * 0.55);
    const gap = Math.floor((W - 40 - bW * n) / (n + 1));
    let bars = '', lbls = '', rPts = [];
    pts.forEach((r, i) => {
      const x = 20 + gap + i * (bW + gap);
      const h = Math.max(4, (invVals[i] / maxInv) * (H - botPad - topPad));
      const y = H - botPad - h;
      bars += '<rect x="' + x + '" y="' + y.toFixed(1) + '" width="' + bW + '" height="' + h.toFixed(1) + '" fill="var(--marrom)" rx="3"><title>Invest: ' + fBRL(invVals[i]) + '</title></rect>';
      // valor acima da barra
      if (h > 16) bars += '<text x="' + (x + bW/2).toFixed(1) + '" y="' + (y - 4).toFixed(1) + '" text-anchor="middle" font-size="9" font-weight="600" fill="var(--marrom2)">' + fBRL(invVals[i]).replace('R$ ','') + '</text>';
      const d = c(r._row, C.INICIO);
      lbls += '<text x="' + (x + bW/2).toFixed(1) + '" y="' + (H - 5) + '" text-anchor="middle" font-size="10" fill="#7A6555">' + (d ? d.slice(0,5) : 'S'+(i+1)) + '</text>';
      // ponto ROAS — normalizado entre topPad e H-botPad
      if (roasVals[i] !== null) {
        const ry = H - botPad - ((roasVals[i] / maxRoas + 1) / 2) * (H - botPad - topPad);
        rPts.push({ x: x + bW/2, y: Math.max(topPad, Math.min(H - botPad, ry)), v: roasVals[i] });
      }
    });
    let roasLine = '';
    if (rPts.length > 1) {
      roasLine = '<polyline points="' + rPts.map(p => p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ') + '" fill="none" stroke="var(--dourado)" stroke-width="2.5" stroke-linejoin="round"/>';
    }
    const rDots = rPts.map(p => '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="5" fill="var(--dourado)" stroke="#fff" stroke-width="1.5"><title>ROAS: ' + p.v.toFixed(1) + '%</title></circle>').join('');
    const leg = '<div class="chart-legend"><div class="leg-item"><span class="leg-dot" style="background:var(--marrom)"></span>Investimento</div><div class="leg-item"><span class="leg-dot" style="background:var(--dourado)"></span>ROAS %</div></div>';
    return '<div class="chart-box" style="overflow:hidden">' + leg + '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" height="160" preserveAspectRatio="xMidYMid meet">' + bars + roasLine + rDots + lbls + '</svg></div>';
  }

  return '<div class="kpi-grid g4">' +
    '<div class="kpi"><div class="kpi-label">💸 Investimento</div><div class="kpi-val">' + fBRL(invN) + '</div><div class="kpi-sub">Na semana</div></div>' +
    '<div class="kpi"><div class="kpi-label">🎯 CPL Médio</div><div class="kpi-val sm">' + fBRL(cplN) + '</div><div class="kpi-sub">Custo por lead</div></div>' +
    '<div class="kpi"><div class="kpi-label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;color:var(--dourado)"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>CTR</div><div class="kpi-val sm">' + ctrFmt + '</div><div class="kpi-sub">Taxa de clique</div></div>' +
    '<div class="kpi"><div class="kpi-label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;color:var(--dourado)"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>ROAS</div><div class="kpi-val sm"' + (roasN!==null?(roasN>=0?' style="color:var(--verde)"':' style="color:var(--vermelho)"'):'') + '>' + (roasN!==null?roasN.toFixed(1)+'%':'—') + '</div><div class="kpi-sub">(Receita − Invest.) ÷ Invest.</div></div>' +
    '</div>' +
    '<div class="grid-2">' +
    '<div class="card"><div class="card-title"><span style="margin-right:.4rem">💸</span>Histórico · Investimento e ROAS</div>' + grafInvRoas(filtConsol) + '</div>' +
    '<div class="card"><div class="card-title"><span style="margin-right:.4rem">🎯</span>Histórico · CTR e CPL</div>' + grafLinhaDupla(filtConsol, C.CTR, C.CPL, 'CTR (%)', 'CPL (R$)', fPct, fBRL) + '</div>' +
    '</div>' +
    (campV||analise ? '<div class="card"><div class="card-title">Campanhas Ativas' + (campV?' ('+campV+')':'') + '</div>' + (analise?'<div class="analise-box" style="margin-top:.5rem">'+analise+'</div>':'') + '</div>' : '');
}

// ── INSIGHTS IA ───────────────────────────────────────────
function renderInsights(reg, regAnt, filtConsol) {
  const row = reg._row;
  const rowA = regAnt ? regAnt._row : null;
  const recN = num(c(row, C.RECEITA));
  const despN = num(c(row, C.DESPESAS));
  const segN = num(c(row, C.SEGUIDORES));
  const criaN = num(c(row, C.CRIATIVOS));
  const acumN = num(c(row, C.ACUMULADO));
  const metaN = num(c(row, C.META));
  const recAnt = rowA ? num(c(rowA, C.RECEITA)) : null;
  const despAnt = rowA ? num(c(rowA, C.DESPESAS)) : null;
  const segAnt = rowA ? num(c(rowA, C.SEGUIDORES)) : null;

  const mid = [], fin = [];
  function add(arr, cor, t, d) { arr.push({cor,t,d}); }

  if (recN !== null && despN !== null) {
    const roi = (recN - despN) / (despN || 1) * 100;
    const res = recN - despN;
    if (roi >= 200) add(fin, 'green', 'ROI de '+roi.toFixed(0)+'% — operação altamente rentável', 'Cada real investido retorna mais de 3x. Estrutura financeira saudável.');
    else if (roi >= 0) add(fin, 'yellow', 'ROI de '+roi.toFixed(0)+'% — margem positiva', 'Retorno positivo. Avaliar principais despesas para otimizar margem.');
    else add(fin, 'red', 'ROI negativo ('+roi.toFixed(0)+'%) — despesas superaram receita', 'Revisar despesas e antecipar recebimentos pendentes.');
    if (res > 0) add(fin, 'green', 'Resultado líquido positivo: '+fBRL(res), 'Receita superou despesas no período.');
    else add(fin, 'red', 'Resultado líquido negativo: '+fBRL(res), 'Despesas superaram receita. Verificar lançamentos.');
  }
  if (recN !== null && recAnt !== null) {
    const v = (recN - recAnt) / Math.abs(recAnt) * 100;
    if (v >= 15) add(mid, 'green', 'Receita subiu '+v.toFixed(0)+'% vs semana anterior', 'Crescimento expressivo. Identificar o que impulsionou e replicar.');
    else if (v <= -15) add(mid, 'red', 'Receita caiu '+Math.abs(v).toFixed(0)+'% vs semana anterior', 'Queda relevante. Investigar causas e acionar plano de recuperação.');
    else add(mid, 'yellow', 'Receita estável ('+(v>0?'+':'')+v.toFixed(0)+'% vs anterior)', 'Desempenho similar à semana anterior. Buscar alavancas de crescimento.');
  }
  if (acumN !== null && metaN) {
    const pct = acumN / metaN * 100;
    if (pct >= 100) add(fin, 'green', 'Meta mensal atingida! 🎉', 'Parabéns! Continue o ritmo.');
    else add(fin, 'yellow', pct.toFixed(0)+'% da meta mensal atingida', 'Faltam '+fBRL(metaN-acumN)+' para bater a meta.');
  }
  if (segN !== null && segAnt !== null) {
    const v = (segN - segAnt) / Math.abs(segAnt) * 100;
    if (v <= -50) add(mid, 'red', 'Seguidores reduziram '+Math.abs(v).toFixed(0)+'% vs semana anterior', 'Queda no crescimento orgânico. Avaliar frequência e relevância dos conteúdos.');
    else if (v >= 20) add(mid, 'green', 'Seguidores cresceram '+v.toFixed(0)+'% vs semana anterior', 'Boa tração orgânica. Identificar conteúdo de melhor performance e replicar.');
    else add(mid, 'yellow', 'Seguidores '+(v>=0?'cresceram':'caíram')+' '+Math.abs(v).toFixed(0)+'% vs semana anterior', 'Crescimento estável. Testar novos formatos para acelerar.');
  }
  if (criaN !== null) {
    if (criaN >= 5) add(mid, 'green', criaN+' criativos publicados — boa frequência', 'Volume adequado. Manter consistência e testar formatos variados.');
    else add(mid, 'yellow', criaN+' criativo(s) publicado(s) — frequência baixa', 'Aumentar cadência de publicações para melhorar alcance orgânico.');
  }

  function renderCards(arr) {
    return arr.map(ins =>
      '<div class="insight-card ' + ins.cor + '"><div class="insight-title">' + ins.t + '</div><div class="insight-desc">' + ins.d + '</div></div>'
    ).join('');
  }
  function sectionLabel(txt) {
    return '<div class="insights-section-label"><div class="insights-section-line"></div><span class="insights-section-txt">' + txt + '</span><div class="insights-section-line"></div></div>';
  }

  return '<div style="margin-bottom:1rem"><div style="font-size:1rem;font-weight:700;color:var(--marrom);margin-bottom:.25rem">Insights de Mídia</div><div style="font-size:.78rem;color:var(--texto2)">Gerados automaticamente com base nos dados do período selecionado.</div></div>' +
    '<div class="insights-grid">' +
    (mid.length ? sectionLabel('Mídia & Performance') + renderCards(mid) : '') +
    (fin.length ? sectionLabel('Financeiro') + renderCards(fin) : '') +
    '</div>';
}

// ── CARREGAR DADOS ────────────────────────────────────────
async function carregarDados(forcar) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-txt');

  // Cache de 1x por dia
  const CACHE_KEY = 'firmare_cache_v2';
  const CACHE_TS  = 'firmare_cache_ts';
  const hoje = new Date().toDateString();
  const cacheTs = localStorage.getItem(CACHE_TS);
  const cacheData = localStorage.getItem(CACHE_KEY);

  if (!forcar && cacheTs === hoje && cacheData) {
    if (dot) dot.style.background = '#4CAF50';
    if (txt) txt.textContent = 'Cache de hoje';
    processarCSV(cacheData);
    return;
  }

  if (dot) dot.style.background = '#FFA000';
  if (txt) txt.textContent = 'Atualizando...';
  try {
    const res = await fetch(SHEET_URL + '&t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    // Salvar cache
    try {
      localStorage.setItem(CACHE_KEY, text);
      localStorage.setItem(CACHE_TS, hoje);
    } catch(e) { /* quota exceeded — ignora */ }
    processarCSV(text);
  } catch(e) {
    console.error(e);
    if (dot) dot.style.background = '#f44336';
    if (txt) txt.textContent = 'Erro ao carregar';
    const el = document.getElementById('content');
    if (el) el.innerHTML = '<div class="error-box"><strong>Não foi possível carregar os dados.</strong><br>Verifique se a planilha está publicada.<br><small>' + e.message + '</small></div>';
  }
}

function processarCSV(text) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-txt');
  try {
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('Planilha vazia ou sem dados');
    HEADERS = rows[0];
    // Filtrar linhas válidas: precisam ter data de início preenchida
    // Isso elimina linhas vazias com apenas dropdowns do Sheets
    const allRows = rows.slice(1).filter(r => r.some(v => v.trim()));
    C = mapearColunas(HEADERS);
    // Após mapear C, filtrar por linhas que têm data de início válida
    ROWS = allRows.filter(r => {
      const inicio = (r[C.INICIO] || '').trim();
      // Data deve ter formato dd/mm/aaaa ou yyyy-mm-dd
      return inicio && (inicio.match(/\d{2}\/\d{2}\/\d{4}/) || inicio.match(/\d{4}-\d{2}-\d{2}/));
    });
    console.log('[Dados] Total linhas válidas:', ROWS.length);
    


    // Popular clientes
    const clientes = [...new Set(ROWS.map(r => c(r, C.CLIENTE)).filter(Boolean))];
    clientesSel = [...clientes];
    const list = document.getElementById('ms-list');
    if (list) {
      list.innerHTML = clientes.map(cl =>
        '<div class="ms-item"><input type="checkbox" class="ms-cb" value="' + cl + '" checked onchange="cbChange()"><span style="flex:1">' + cl + '</span><span class="ms-only" onclick="somenteEste(event,\'' + cl + '\')">somente este</span></div>'
      ).join('');
    }
    atualizarBtnCliente();

    // Popular dropdowns de semana
    popularSemanaDD('list-inicio', 'btn-inicio', 'lbl-inicio', C.INICIO, 'Início Semana');
    popularSemanaDD('list-fim', 'btn-fim', 'lbl-fim', C.FIM, 'Fim Semana');

    if (dot) dot.style.background = '#4CAF50';
    if (txt) txt.textContent = 'Atualizado';
    semanaIdx = 0;
    render();
  } catch(e) {
    console.error(e);
    if (dot) dot.style.background = '#f44336';
    if (txt) txt.textContent = 'Erro ao carregar';
    const el = document.getElementById('content');
    if (el) el.innerHTML = '<div class="error-box"><strong>Não foi possível carregar os dados.</strong><br>Verifique se a planilha está publicada.<br><small>' + e.message + '</small></div>';
  }
}

const ddVals = {};

function popularSemanaDD(listId, btnId, lblId, colIdx, placeholder) {
  const vals = [...new Set(ROWS.map(r => c(r, colIdx)).filter(Boolean))];
  vals.sort((a, b) => (parseData(b) || 0) - (parseData(a) || 0));
  const list = document.getElementById(listId);

  ddVals[listId] = { vals, colIdx, placeholder };
  list.innerHTML = '<div class="dd-opt placeholder" onclick="selecionarSemana(\'' + listId + '\',\'\',\'' + btnId + '\',\'' + lblId + '\',\'' + placeholder + '\')">' + placeholder + '</div>' +
    vals.map(v => '<div class="dd-opt" onclick="selecionarSemana(\'' + listId + '\',\'' + v + '\',\'' + btnId + '\',\'' + lblId + '\',\'' + placeholder + '\')">' + v + '</div>').join('');
}

function selecionarSemana(listId, val, btnId, lblId, placeholder) {
  const lbl = document.getElementById(lblId);
  const btn = document.getElementById(btnId);
  const dd = document.getElementById(listId === 'list-inicio' ? 'dd-inicio' : 'dd-fim');
  if (lbl) lbl.textContent = val || placeholder;
  if (btn) btn.classList.toggle('active', !!val);
  if (dd) dd.classList.remove('open');
  if (listId === 'list-inicio') filtroInicio = val;
  else filtroFim = val;
  semanaIdx = 0;
  render();
  // Atualizar destaque
  const list = document.getElementById(listId);
  if (list) list.querySelectorAll('.dd-opt').forEach(o => o.classList.toggle('selected', o.textContent === val));
}

function toggleDD(id) {
  document.querySelectorAll('.filter-dd').forEach(d => { if (d.id !== id) d.classList.remove('open'); });
  document.querySelectorAll('.ms-dd').forEach(d => d.classList.remove('open'));
  const dd = document.getElementById(id);
  if (dd) dd.classList.toggle('open');
}

function filterDD(input, ddId) {
  const q = input.value.toLowerCase();

// ── PDF ───────────────────────────────────────────────────
async function downloadPDF() {
  const btn = document.querySelector('.btn-pdf');
  if (btn) { btn.disabled = true; btn.textContent = 'Gerando...'; }
  try {
    const el = document.getElementById('content');
    // Expandir temporariamente para capturar tudo
    const origOverflow = el.style.overflow;
    const origHeight = el.style.height;
    el.style.overflow = 'visible';
    el.style.height = 'auto';
    const canvas = await html2canvas(el, {
      scale: 2, backgroundColor: '#F9F7F2', useCORS: true,
      scrollX: 0, scrollY: 0,
      windowWidth: el.scrollWidth,
      windowHeight: el.scrollHeight,
      height: el.scrollHeight,
      width: el.scrollWidth
    });
    el.style.overflow = origOverflow;
    el.style.height = origHeight;
    const { jsPDF } = window.jspdf;
    const imgW = canvas.width, imgH = canvas.height;
    const ratio = imgH / imgW;
    const pdf = new jsPDF({ orientation: ratio > 1 ? 'portrait' : 'landscape', unit: 'mm', format: 'a4' });
    const pW = pdf.internal.pageSize.getWidth();
    const pH = pdf.internal.pageSize.getHeight();
    // Paginar se conteúdo for muito alto
    const pxPerMm = imgW / pW;
    const pageHeightPx = pH * pxPerMm;
    let yPos = 0, page = 0;
    while (yPos < imgH) {
      if (page > 0) pdf.addPage();
      const sliceH = Math.min(pageHeightPx, imgH - yPos);
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = imgW; tempCanvas.height = sliceH;
      const ctx = tempCanvas.getContext('2d');
      ctx.drawImage(canvas, 0, -yPos);
      pdf.addImage(tempCanvas.toDataURL('image/png'), 'PNG', 0, 0, pW, sliceH / pxPerMm);
      yPos += pageHeightPx; page++;
    }
    // Forçar download via blob para evitar interceptação do browser/OneDrive
    const pdfBlob = pdf.output('blob');
    const blobUrl = URL.createObjectURL(pdfBlob);
    const link = document.createElement('a');
    link.href = blobUrl;
    link.download = 'Firmare_' + moduloAtivo + '_' + new Date().toLocaleDateString('pt-BR').replace(/\//g, '-') + '.pdf';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(() => URL.revokeObjectURL(blobUrl), 3000);
  } catch(e) { console.error(e); }
  if (btn) { btn.disabled = false; btn.textContent = 'Baixar PDF'; }
}
</script>
</body>
</html>
